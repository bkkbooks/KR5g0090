front:
  text: 五嶽真形圖序論笙八昔漢孝武帝好長生之道常祭祀名山大澤祈祀靈嶽以求神仙之應以元封元年正月甲子祭嵩高山起道宫帝齋七日祠訖乃還到四月戊辰夜閑居東方朔董仲舒在側焉忽見一女人著青衣非常麗也帝愕然問何人女曰我墉宫玉女也爲王母所使從崑崙山來語帝聞子欲輕四海之禄尋道求生降帝尊之位而屢禱山嶽勤哉有心似可教者也從今百日清齋不交人事到來年七月七日西王母當蹔來也武帝下席跪諾言訖玉女隱忽然失所帝於是登尋真之臺齋戒存道其四方之事權委於冢宰焉到七月七日掃除宫掖之内設座於大殿之上以紫羅薦地燔百和之香張雲錦之帷然九光微燈設玉女之裘葡萄之酒躬監殽蔌以爲天宫之饌帝乃盛服立於階下勑端門之内竪不得有妄闚者内外謐寂以俟仙官到夜二唱之後忽見天西南如白雲鬱鬱直來遥赴宫庭須臾轉近聞雲中有簫鼓之聲人馬之響復半食頃間王母至也懸投殿前有似鳥集或駕龍虎或乘白鹿或乘白麟或乘白鵠或乘科車或乘天馬羣仙數千光耀庭宇既至從官不知所在唯見王母乘紫雲之輦又駕九色斑龍别有五十天仙側近雲駕皆身長一丈同執彩旄之節佩金剛靈璽帶天真之策咸住殿下王母唯扶二侍女上殿侍女年可十六七服青綾之袿容眸流盼神爽清發妙姿絶世也王母上殿東向坐著黄錦袷䙱文彩明鮮金光奕奕交帶靈飛大綬腰帶分景劒頭上大華結戴泰真晨嬰之冠履玄瓊鳳文之舄映玄雲棟神光暐嘩視之年三十許脩短得中天姿晻靄靈顔絶世真靈人者也下車登牀武帝拜跪問寒温畢立如也因呼武帝共坐帝南向王母自設厨厨精麗非常豐珍之殽芳華百果紫芝葳蕤紛若填樏清香之酒非地上所有甘氣絶世殊於俗味武帝不能名也又命侍女更索桃果須臾以玉盤盛桃七枚大如鴨子形圓色青以呈王母王母以四枚與帝王母自食三枚桃之甘美口有盈味帝食輙録核王母問録核何爲帝曰欲種之耳王母曰此桃三千年一生實耳中夏地薄種之不生如何帝乃止徐乃下地叩頭自陳曰徹受質不中耽淪流俗承禪先業遂羈世累政事多闕兆民無和風雨失節五穀不實德澤不建㓂盜四起當由其主積罪丘山然少好生道仰慕靈仙未能棄禄委榮棲跡山林思絶塵餌罔知攸向且棄世尋真鑚啓無師歲月見及恒慮奄忽不圖天眞頓集今日下臣有幸得瞻上聖是臣宿命當得度世願垂哀矜賜諸不悟得以奉承切己之教王母曰汝能賤榮樂卑躭靈味道自復佳耳然汝情恣體慾淫亂過甚殺伐非法奢侈其性恣則裂體之車淫爲破年之斧殺則響對奢則心爛慾積神損聚穢命斷以此蕞爾之身而宅滅形之賊盈尺之才乃攻之百刃欲以解脫三尸令身永久難可得也有似無翅之鷃願鼓翼天池朝生之蟲而樂春秋者哉若能蕩此衆亂撥穢易韻保神炁於絳府閉淫宫而不開靜奢侈於寂室愛衆生而不危守兹道戒思乎靈味務施惠和鍊精惜氣早却浮麗令百競速逝汝行有若斯之事將豈無彷彿耶如其不爾無爲抱石而濟長津矣帝跪受聖誡請事斯語帝見王母巾器中有一卷小書盛以紫錦之囊帝請問此書是仙靈方耶不審其目可得瞻盼不王母出以示之此五嶽眞形圖也昨青城諸仙就我請求今當過以付之此乃三天太上所出文祕禁重豈汝穢質所宜佩乎今且與汝靈光生經可以通神勸志也帝固請不已王母曰昔上皇清虛元年三天太上道君下觀六合瞻河海之短長察丘山之高卑名天柱安於地理頓五嶽而擬諸鎮輔貴昆陵以舍靈仙尊蓬丘以館真人安水神乎極陰之源栖太帝乎扶桑之墟於是方丈之阜爲理命之室滄浪海島養九老之堂祖瀛玄炎長元流生鳳麟聚窟各爲洲名並在滄流大海玄津之中水則碧黑俱流波則震蕩羣精諸仙玉女聚居滄英其名難尋其實分明爾乃因山源之䂓覩河嶽之盤曲陵回阜轉山高隴長周旋委蛇形似書字是故因象制名定名實之號盡形祕於玄臺而出爲靈眞之信諸仙佩之皆如傳章道士執之經行山川百神羣靈尊奉親迎汝雖不正然數詣山澤叩求之志不忘干道欣子有心今以相與當奉深愼如事君父泄示凡人必致禍考按九老仙都千明之科九炁丈人昭生之符太靈羣文皆是三天太上大道君所撰或是三皇天真所造或是九天父母真人赤童所出此輩聽四十年得傳一人四十年無其人聽八十年頓傳二人耳授非其人是爲泄天道可授而不傳是爲閉天寳不計限而妄授是爲輕天老受而不敬是爲慢天藻泄閉輕慢四者延禍之車也泄則身死道路受生形而骸裂閉則盲聾於來生命凋枉而卒殁輕則禍鍾於父母詣玄都而考罰慢則暴終而墮惡疾於後世復有愈此罪者宗斷而族没同道謂之天親同心謂之地愛傳授當相親愛共均榮辱營心真一珍惜精液共養和氣氣合神歸必齊靈會如其不爾天降汝癘此皆道之科禁今故相戒不可不愼若汝欲有所授董仲舒者似其人也即命侍女使更取一圖以與武帝侍女探懷中得一卷形書精明俱如向者王母以手付帝再拜跪受王母曰若汝遂尅明正身反惡修善復三年七月更來告汝道也須臾殿南窗朱鳥䆫中有一人來看闚王母帝驚問何人王母曰汝不識此人耶是汝侍郎東方朔也是我鄰小兒而性多滑稽曾三來偷此桃子昔爲太上仙官太上令到方丈使助三天司命收諸家朔到方丈但務山水遊戲了不共營和氣擅弄雷電激波揚風風雨失時陰陽錯逆致令蛟鯨陸行山崩壞境海水暴竭黄馬宿淵妨農芝田沈湎玉酒失部御之和虧奉命之科於是九源丈人乃言之於太上太上遂謫斥使在人間去泰清之朝令處臭濁之倫近蒙金華山二仙人及九嶷君比爲陳乞以行原之於是帝始知朔非世人也言語飲酒因告武帝仙官從者姓字及冠帶執佩物名所以得知而記焉至向曉王母别去臨發人馬龍虎鼓吹導引如初來時雲炁勃鬱盡爲香氣極望西南良久乃絶於是帝既見王母乃信天下有神仙之事欲有去世計數矣而淫色自性殺伐不休百姓嘆於勞役死者怨於無辜不從聖母之言遂不復來也先王母見武帝多所稱說或延年之訣致神之術帝乃自撰集爲一卷及所與經圖之屬帝皆請以黄金之几封以白玉之函安著柏梁臺上後到太初元年天火焚臺於是眞形及靈光生經自撰受集要遂爾燒失王母常以武帝不從訓誨而災之耳但帝先承王母言以圖授董仲舒仲舒登寫賴此得存也其後東方朔一旦乘雲龍飛去同時衆人見後西北上冉冉仰望大霧覆之不知所在帝甚懊恨自知失道其年十二月壇蒿里祠后土東臨渤海望祠蓬萊山春還受計于甘泉二月起建章宫夏五月正曆以正月爲歲首色上黄數用五定官名協音律遣將軍公孫敖築塞外受降城秋八月幸安定遣貳師將軍李廣利發天下勇兵西征大宛改曆以正月爲歲首是王母之意也鮑靚曰予察王母衆仙之宗猶珍貴此文何凡近小人而欲盼之乎漢武帝以王母言問東方朔朔對如别祖洲
