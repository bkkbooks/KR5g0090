body:
  text: 瀛州玄洲炎洲長洲元洲流洲生洲鳳麟洲聚窟洲此言皆十洲之名處巨海之中是人跡所不逮處祖洲在東海中地方五百里去西岸七萬里上有不死之草草形似菰苗長三四尺許人已死者以草覆之皆登時活也末服之令人長生昔秦始皇時大宛中多枉死人横道時有鳥如烏狀數銜此草以覆死人面皆登時起坐有司奏聞始皇遣使者齎草以問北郭鬼谷先生先生云此是東海中祖洲上不死草也其草生瓊白中或名爲養神芝其葉似菰生不叢採止活一人始皇於是乃遣童男童女五百人入海尋祖洲遂不返也瀛洲在東海中地方四千里對會稽去岸十七萬里上生神仙芝草有玉石高且千丈出泉如酒味名爲玉酒或爲玉膏飲數升輙醉令人長生洲上多仙家風俗似吴人玄洲在北海之戌亥地地方七千二百里去岸三十六萬里上有太玄都仙伯治玄丘山又有風山聲氣響電對向天西北門上多太玄仙宫炎洲在南海中地方二千里去岸九萬里上有風生獸似貂青色大如狸張網取之積薪數車以燒之薪盡而此獸在灰中不燃其毛不燋斫刺不入打之如皮囊以鐵鎚鍛其頭數千下乃死而張其口以向風須臾便活而起以石上菖蒲塞其鼻即死取腦和菊華服之盡十斤得五百年又有炎林山山中有夜光獸大如鼠毛長三四寸或赤或白山可二百里許晦夜望見山林及此獸光照如燃火狀取其獸毛績以爲布名曰火澣布衣服此布垢污以灰水浣之終不除唯以火燒之兩食許出振其垢更白潔如雪亦多仙人長洲一名青丘在南海辰巳地地方五千里去岸二十萬里上饒山川又多大樹樹乃有二千圍者一洲之上專是林木故或名爲青丘仙草靈藥甘液玉英靡所不有又有風山山弘震聲上有紫府宫天眞仙女多遊於此元洲在北海中地方三千里去岸十萬里上有五芝玄澗澗水如蜜服之長生服其芝不死亦饒仙家流洲在西海中地方三千里去岸十萬里上多山川積石名爲昆吾石治其石成鐵作劒光明照洞如水精狀割玉如割泥焉亦饒仙家生洲在東海寅丑之間接蓬萊十七萬里地方二千三百里去岸二十三萬里上有仙家數萬天炁安和草木常生長養萬物地無寒暑亦多山川仙草又一洲水味皆甘如飴酪至良者也鳳麟洲在西海之中地方千五百里洲四面有弱水遶之鴻毛不浮不可越也洲上專多鳳麟數萬爲羣並有山川池澤及神草百種亦饒仙家煮鳳喙及麟角合煎作膠名之爲集弦膠或名之爲連金泥此膠能續弓弩斷弦連已折之金並連集更打折他處乃斷此所集際終不脫也聚窟洲在西海中居申未之地地方三千里接崑崙十萬六千里去岸二十四萬里上有真仙靈官宫第比門不可勝數及有獅子辟邪鑿齒天鹿長牙銅頭鐵額之獸洲上有大山形似人鳥因名之爲人鳥山山多大樹與楓木相似而枝葉氣香聞數百里名之爲反魂樹叩其樹樹亦能自作聲聲如羣牛呴聞之者皆心震神駭伐其木根心於玉釜中煮取汁更微火熟煎之如黑飴狀令可丸名之爲驚精香或名之爲震靈丸或名之爲反生香或名之爲震壇香或名之爲人鳥精或名之爲却死香一種六名斯靈物也香氣聞數百里死尸在地聞氣乃活不復須以熏死人而生也滄海島在北海中地方二千里去岸二十萬里海四面遶島各五千里水皆滄色謂之滄海也島上專是大山積石至多八石芝石腦石桂英流丹黄子之輩百許種皆生於島石服之長生島中有紫石宫室九老仙都治處仙官萬許人方丈在東海中央東西岸相去正等地方三千里上專是羣龍所聚有金玉之宫三天司命所治處羣仙不欲昇天者皆在此洲受太玄生籙仙家數萬耕田種芝草課計頃畒如種稻狀亦有玉石泉上有九源丈人宫主領天下水神及龍蛟陰獸之物扶桑在東海之東岸直上岸萬里復得碧海廣狹浩汗與今萬海等大水既不鹹苦正作碧色甘香味美扶桑地方萬里上有太帝太眞東王所治處多生林木葉皆如桑又有椹樹長者數千丈大二千餘圍樹兩兩同根偶生更相依倚是以名爲扶桑芝仙人食其椹體皆作金色其樹雖大其葉椹故如中夏無異但味絶甘香耳地生黄金白玉瓦石狀仙人身亦有長十丈者亦有長五六尺者蓬丘蓬萊山也對大海東北岸山周迴三千里其外别有圓海遶山圓海水正黑色謂之溟海也無風而洪波百丈不可得往來上有九炁丈人九天真王宫唯飛仙能有到其處耳崑陵崑崙山也在西海之崖申未地也去咸陽四十二萬里山高平地萬里上方千里形如仰甕下狹上廣故名之爲崑崙周匝弱水遶山上有金城五所玉樓十二所流精之闕光碧之堂瓊華之室紫翠密房西王母之所治衆仙所宗上通璇璣九炁流布帝王玉衡品物羣生希奇出皆在於此不可具記太上名山鼎於五方鎮地理也號天柱於岷城象罔輔也諸百川極深水靈居之其陰難到故治無常處非如丘陵而可得論是以天地設位因物象之宜上聖觀方緣形而著爾乃處玄風於西北坐王母於坤鄉昆吾鎮於流澤大桑植於碧津離合天精而光獸生於炎野坎緫衆陰是以仙都宅于海島艮位山方蓬山塡於寅丑巽體元女養巨木於長洲高風鼓乎羣龍之位暢靈人於遐丘至妙玄深幽神難盡真仙隱宅靈陵所在六合之内豈唯數處而已矣此皆舉其標末耳朔所見不博未能宣通聖詞昔曾聞之於得道者說此十洲大丘靈阜皆是真仙奥墟神官所治其餘山川萬端並無復及此者也堯時遣禹治洪水經諸五嶽使刻石識其里數高下其字科斗書非漢人所了也今丈尺里數皆是禹時書也不但刻度五嶽諸名山亦然刻山之獨高處耳今書處是朔所具見其王母所道諸靈藪禹所不履唯書於中夏之山石也魯女生長樂人也少好道初服餌胡麻及求絶穀八十餘年日更少壯色如桃花一日能行三百里走及麞鹿傳世見之二百餘年後採藥於嵩高山忽見一人坐礀上女生叩頭再拜稽首乞長生之要其人曰我三天太上侍官者也汝當得仙故得見我我將授汝寳文祕要可以威制五嶽役使衆靈良久乃以五嶽真形圖以與之並告其施用節度女生道成一旦乘龍與知交故人别云入華山中女後復五十年先相識者逢女生於華山廟前乘白鹿從玉女三十人并令謝其鄉里親戚故人甚分明也說女生顔色更少五嶽圖與王母訣正同今得見於世間者起由董仲舒及女生二人得之仲舒臨去以傳欒巴女生後以傳封君達晉魏際君達入玄丘山臨去傳鄭氏弟子葛洪曰夫至道無形機妙難論神仙之事誠非小醜所宜緣尋然世人不覩其門皆謂之無既見眞驗復不肯以語人是以清濁乖律香臭絶倫若道士得祕聖之書皆當杜於一人口者則靈眞之文將墜於獨見何緣得存流於百代乎洪謂傳授但當必得其人耳豈可都閉耶自江東都無有此書若鄭君復祕而不出則斯文永翳也昔曾以此白鄭君鄭君曰道書人皆有之如三皇天文大字及靈書至妙修勤求慕時或聞見五嶽眞形圖自録之首吴越之人無有得傳將斯文之不出文貴而不授乎不審先生有此書與不儻令魚目之珠映於九陽之光洿丘瓦石蹔盻南和之肆若遂仰瞻天眞則洪心堅愈深鄭君曰此書吾似有之傳授禁重不可妄泄傳非其人罪咎必至凡道士輩雖心希清正而行多不備不備則有慮有慮則禍詣亦何急令致禍之書而爲刀鋸乎是以先流得之者又不敢輕以授人便自都絶正如此耳卿極有心必能通玄暢昧是故相告且勿宣之吾先受此書於青牛先生自吾受圖以來未傳一人依仙科當付一人乃得絶身棄跡耳世上波波不可復停行當以此文與卿復是一年許七月閑夜見呼告曰吾方當去可具素寫圖洪乃齋盛祭受今施用節度皆出於鄭君也鄭君說青牛先生仙人封君達本隴西人也初服黄連五十餘年入鳥鼠山又於山中服練水銀百餘年還鄉里年如三十者常乘青牛故號青牛道士行聞有疾殆死者識與不識便以腰間竹管中藥與服之或爲下鍼應手皆愈世多得其驗効都不以姓字語人人通識乘青牛爲名耳人間復二百餘年入玄丘山中不知所在青牛先生言家有五嶽真形一嶽各遣五神來衛謢圖書所居山川近心者山澤神又恒遣侍官防身營家凶逆欲見傷害皆反受其殃辟除五兵五温可帶履鋒刃又司人之姦穢言人之不正不正者禍身姦穢者禍門是以宜深忌愼人有帶此文及執持以履山林者百山地源靈主皆出境拜迎尊貴圖信鬼神猶執卑降之禮何況凡人而可慢惰哉鄭君言在家一歲輙一祭圖令人居家富昌宦身陽升行來諧合凶禍遠迸求欲得願長生延年若山林獨處可虧祭也所以然者山林幽寂栖心無邪又非酒殽所出唯當恭而已矣家居混雜有婦女雞犬塵穢生於部界惰慢出自言語先或污濁神炁或産乳堂宇是故齋祭靈圖以謝災癘以月建齋三日又須夜半之時出庭中或密室中西向勿令人昔黄帝遊觀六合後造神靈見東中西北四嶽並有佐命之山唯衡山峙立無輔乃與昌宇力牧方明等章祠三天太上使命霍山潛山爲南嶽儲君拜青城山爲丈人署廬山爲使者令緫衡嶽以鼎鎮舉德真而爲主儲君者衡嶽之副君也吴越人或霍山爲嶽其實非正也授圖祭文鄭氏所出某以胎生肉人百官子孫沉湎囂惡流濁世務運遇有幸得奉大化滌蕩穢俗許以更始修心愼違希企靈真夙夜馳競不敢寧捨昔以某年月日歲在某處受先師甲乙眞形按九都千明之科許得傳授謹按道法當付良密今有同志道士某郡縣鄉里男生某甲年如千歲小心勤翼必能宣啓靈化敷正神炁即以今年月歃血誓書授其真圖委繒告盟禁以不傳天親同心常相愛謢不得棄元崇末要衒榮利其五八大約禍福所期量己審人任之處焉謹清齋祭付唯即一列上達三天受圖祭文鄭君所出某本胎生肉人枯骨子孫生長濁世染亂罪考宿行積咎禍高丘陵天啓其衷得聞聖化心開改蹟好生樂道仰慕靈感思求眞應庶蒙清蕩以延性命恒捨穢率善願爲種民攅求遐年當須天啓登山履川亦賴靈助注心道門不敢𢹂貳並仰貢方物自輔信及今即日受五嶽眞形藏戢一己與之終始五八有期永無中泄傳授相親愛謢同氣蠲齊榮辱天科所祐不敢慢惰抵犯禁網遵受法訣封之于心謹清齋告祭以爲其始唯即一列上達三天章奏太上除某三尸登書生録刻題玉札緘之絳府五方靈嶽各遣五神千山百川時差侍官營守圖文防謢某身使長生永存壽延億千鮑氏佩施用靚按黄帝橐籥五匱内真文云此書是三天太上撰次所岀曾聞之於先達者言西王母紫蘭宫屋通畫此象諸墉宫玉女仙人服衣皆以此形畫之昔遣中黄太一以此圖下授名山隱逸有仙録者結約五八之年而傳也自無運命之遇莫見其篇目矣如魯女生山中受之皆此類也仙人云道士佩此文入山林川澤所經諸靈神皆出郊境奉迎焉然五嶽各有所部東方之山則屬東嶽其西嶽南嶽北嶽亦同唯平地江河淮水及中央之山陵皆統中嶽之部也諸入山採八石石衆石腦流丹流珠飛節黄子石髓桂英及芝草諸神藥自無五嶽佩之此仙物終不可得也欲佩之法以青爲繒或用白爲繒盛以紫囊或帶之頭上或帶之心前或肘後山無大小皆有靈神神來形見自稱某山某中來迎拜也是太上真人以爲所使策文五嶽衛此圖書如今世人敬監司之章節狀所以丘山之神而來拜謁也受付之法限之四十年一傳歃血委暫而約人有此文在家者五嶽君各遣五神來奉衛圖文所居山川源澤諸靈各遣侍人營謢子耳他人憎嫉謀議口舌凶逆賊害及縣官繫子者五嶽所衛二十五神及山川侍官即白所居之部嶽君嶽君即使鬼物反害彼人自中也奉之者不可不正身清神若行邪亂慢不尊所受忽賤靈信輕侮宗末者禍至滅家不可不愼入山無眞形則衆精壞人採藥不得眞形則羣靈蔽之爲道士不得眞形則魂氣不定三尸亂干術士不得此文皆不成就但有此文以佩身仍足彌綸衆神横行天地在家則神人奉衛入山則群靈奉迎採藥服芝草則眞仙營謢經疫遇害則災自滅爾乃虛往實來眞驗禍福將有道者其祕而尊焉漢元封元年西王母授孝武皇帝太上眞仙授仙人長樂魯女生五嶽圖序東方朔所出五嶽眞形者山水之象也盤曲迴轉陵阜形勢高下參差長短捲舒波流似於奮筆鋒芒暢乎嶺崿雲林玄黄有如書字之狀是以天眞道君下觀䂓矩擬縱趣向因如字韻隨形而名山子有東嶽形令人神安命延存身長久入山履川百芝自聚子有南嶽形五温不加辟除火光謀惡我者反還自傷子有中嶽形所向唯利致財巨億願願尅合不勞身力子有西嶽形消辟五兵入刃不傷山川名神尊奉司迎子有北嶽形入水却灾百毒滅伏役使蛟龍長享福禄子盡有五嶽形横天縱地彌綸四方見我懽悅人神攸同昔黄帝徵師諸侯與蚩尤戰於涿鹿之野遂擒之諸侯咸宗爲天子代神農氏是爲黄帝天下有不順者從而征之破山通道未嘗寧居東至于海登太山及岱宗西至崆峒登雞頭南至于江登熊湘北逐蟬粥金符釜山而邑于涿鹿之阿遷徙往來無有常處察四嶽並有佐命之山而南嶽獨孤峙而無輔乃章祠三天太上道君命霍山潜山爲儲君奏可帝乃自造山躬寫形像連五圖之後又命拜青城爲丈人署廬山爲使者形皆以次相續此適始於黄帝耳東嶽泰山君領群神五千九百人主治死生百鬼之主帥也血食廟祠宗伯者也俗世所奉鬼祠邪精之神而死者皆歸泰山受罪考焉諸得佩五嶽形入經山林及詣泰山君及諸山川百神皆出境迎拜子也泰山君服青袍戴蒼碧七稱之冠佩通陽太朔之印乘青龍從群官來迎子南嶽衡山君領仙官七萬七百人入諸南嶽所部山川神皆出迎南嶽君服朱光之袍九丹日精之冠佩夜光天眞之印乘赤龍從群官來迎子中嶽嵩山君領仙官玉女三萬人入諸山是中嶽所部名靈皆來迎中嶽君服黄素之袍戴黄玉太乙之冠佩神宗陽和之印乘黄龍從群官而迎也中嶽是五土之主善敬之太上常用三天眞人有德望者以居之西嶽華山君領仙人玉女四千一百人道士入其所部之山川神並來迎華山君身服白素之袍冠太初九流之冠佩開天通眞之印乘白龍而來迎子北嶽恒山君領仙人玉女七千人其入所部之山川神皆來迎北嶽君服玄流之袍冠太眞冥靈之冠佩長津悟眞之印乘黑龍而來迎子青城丈人黄帝所命也主地仙人是五嶽之上司以緫群官也丈人領仙官萬人道士入其山者丈人服朱光之袍戴蓋天之冠佩三庭之印乘科車從衆靈而來迎子廬山使者黄帝所命秩比御史主緫仙官之位蓋五嶽之監司道士入其山者使者服朱緋之䙱戴平華之冠佩三天眞形之印而來迎子亦乘科車從以衆靈霍山南嶽儲君黄帝所命衡嶽之副主也領群靈三萬人上調和氣下拯黎民關校衆仙制命水神是峻驗之府而爲諸靈之所順也道士入其境儲君服青錦之袍戴啓明之冠佩道君之玉策而來迎子或乘科車或駕龍虎潜山儲君黄帝所命爲衡嶽儲貳時叅政事令職似輔佐者也入其山潜君服紫光繡衣戴叅靈之冠佩朱官之印乘赤虬之車而來迎子諸佐命山君並輔弼嶽君預於位政道士入其山佐命服朱袍戴仙華之冠佩太上眞形章而來迎子所乘無常東方朔言古畫五嶽眞形首目者乃是神農前世太上八會群方飛天之書法殆鳥跡之先代也自不得仙人譯注顯出終不可知也凡道士欲佩圖進取山象及書古文卷畢以此題外面然後盛之帶符當得正月建寅齋七日齋中寫白訖醮如傳授法但易章中自說辭旨隨人也凡寫書皆燒香於左右五嶽眞形圖序論
